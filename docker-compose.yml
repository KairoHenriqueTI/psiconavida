services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pnv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pnv_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pnv_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pnv_user} -d ${POSTGRES_DB:-pnv_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-pnv_user}:${POSTGRES_PASSWORD:-pnv_pass}@db:5432/${POSTGRES_DB:-pnv_db}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://api.psico.kairohenrique.dev}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      FRONTEND_URL: ${FRONTEND_URL:-https://psico.kairohenrique.dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    profiles:
      - caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

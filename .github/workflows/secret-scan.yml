# Simple secret-scan workflow
# This workflow runs on pull requests and pushes to main and looks for common secret patterns
name: Secret Scan

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for obvious secrets
        run: |
          set -euo pipefail
          echo "Looking for committed env keys..."
          rg --hidden --no-ignore-vcs --line-number "(NEXTAUTH_SECRET|OPENAI_API_KEY|VITE_SUPABASE|DATABASE_URL|SMTP_PASS)" || true
        shell: bash
